<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Funnel Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, #064e3b20, transparent 40%), radial-gradient(circle at bottom left, #064e3b10, transparent 40%);
        }
    </style>
</head>

<body>
    <div id="root" class="w-full flex justify-center items-center h-full p-4"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Spinner = () => (
            <svg className="w-16 h-16 text-emerald-500 animate-spin flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );
        const CloseIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const ChevronRightIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        );
        const CheckIcon = () => (
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        );
        const BigCheckIcon = () => (
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        );

        const INITIAL_ANSWERS = {
            mercados: [],
            tipoTrader: "",
            frecuencia: "",
            falta: "",
            cambio: "",
            formato: "",
        };

        function QuizFunnel({ isOpen, onClose }) {
            const [step, setStep] = useState(1);
            const [answers, setAnswers] = useState(INITIAL_ANSWERS);
            const [contact, setContact] = useState({ name: "", email: "" });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [success, setSuccess] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                if (step === 7) {
                    const timer = setTimeout(() => {
                        setStep(8);
                    }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [step]);

            if (!isOpen) return null;

            const handleNext = () => setStep((s) => s + 1);

            const toggleMercado = (m) => {
                setAnswers((prev) => {
                    const isSelected = prev.mercados.includes(m);
                    if (isSelected) return { ...prev, mercados: prev.mercados.filter((x) => x !== m) };
                    else return { ...prev, mercados: [...prev.mercados, m] };
                });
            };

            const selectSingleOption = (field, val) => {
                setAnswers((prev) => ({ ...prev, [field]: val }));
                setTimeout(() => handleNext(), 300);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!contact.name || !contact.email) {
                    setErrorMsg("Por favor, llena ambos campos.");
                    return;
                }

                setIsSubmitting(true);
                setErrorMsg("");

                // Mock success due to no backend
                setTimeout(() => {
                    setSuccess(true);
                    setTimeout(() => {
                        onClose();
                        setStep(1);
                        setAnswers(INITIAL_ANSWERS);
                        setContact({ name: "", email: "" });
                        setSuccess(false);
                        setIsSubmitting(false);
                    }, 3000);
                }, 1000);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 transition-opacity duration-300">
                    <div className="relative w-full max-w-lg bg-zinc-950 border border-zinc-800 rounded-3xl shadow-2xl shadow-emerald-900/10 overflow-hidden flex flex-col transform transition-transform duration-300">

                        {step !== 7 && !success && (
                            <button onClick={onClose} className="absolute top-4 right-4 p-2 text-zinc-400 hover:text-white hover:bg-zinc-800 rounded-full transition-colors z-10">
                                <CloseIcon />
                            </button>
                        )}

                        {step < 7 && (
                            <div className="w-full bg-zinc-900 h-1.5">
                                <div className="h-full bg-gradient-to-r from-emerald-500 to-green-400 transition-all duration-300" style={{ width: `${(step / 6) * 100}%` }} />
                            </div>
                        )}

                        <div className="p-6 md:p-8 flex-1 flex flex-col justify-center min-h-[400px]">
                            <div className="animate-in fade-in zoom-in-95 duration-300">
                                {step === 1 && (
                                    <div className="flex flex-col gap-6">
                                        <h3 className="text-2xl font-semibold text-white leading-tight">¿En qué mercado operas o te interesa operar?</h3>
                                        <p className="text-zinc-400 text-sm -mt-4">Puedes seleccionar más de uno.</p>
                                        <div className="flex flex-col gap-3">
                                            {["Acciones USA", "Criptomonedas", "Forex", "Futuros", "Materias Primas"].map((m) => {
                                                const active = answers.mercados.includes(m);
                                                return (
                                                    <button key={m} onClick={() => toggleMercado(m)} className={`text-left px-5 py-4 rounded-2xl border transition-all duration-200 flex justify-between items-center group ${active ? "border-emerald-500 bg-emerald-500/10 text-white" : "border-zinc-800 bg-zinc-900/50 text-zinc-300 hover:border-emerald-500/50 hover:bg-zinc-800"}`}>
                                                        <span className="font-medium">{m}</span>
                                                        <div className={`w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${active ? "border-emerald-500 bg-emerald-500 text-black" : "border-zinc-600 group-hover:border-emerald-500/50"}`}>
                                                            {active && <CheckIcon />}
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        <button disabled={answers.mercados.length === 0} onClick={handleNext} className="mt-4 flex items-center justify-center gap-2 bg-white text-black font-bold py-4 rounded-2xl hover:bg-zinc-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                            Continuar <ChevronRightIcon />
                                        </button>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="flex flex-col gap-6">
                                        <h3 className="text-2xl font-semibold text-white leading-tight">¿Qué tipo de trader eres (o quieres ser)?</h3>
                                        <div className="flex flex-col gap-3">
                                            {["Scalper", "Intradía", "Swing", "Todavía no lo tengo claro"].map((opt) => (
                                                <button key={opt} onClick={() => selectSingleOption("tipoTrader", opt)} className="text-left px-5 py-4 rounded-2xl border border-zinc-800 bg-zinc-900/50 text-zinc-300 hover:border-emerald-500 hover:bg-emerald-500/10 hover:text-white transition-all duration-200 font-medium">{opt}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="flex flex-col gap-6">
                                        <h3 className="text-2xl font-semibold text-white leading-tight">¿Con qué frecuencia operas actualmente?</h3>
                                        <div className="flex flex-col gap-3">
                                            {["Todos los días", "Varias veces por semana", "Solo cuando veo una oportunidad", "Aún no empiezo"].map((opt) => (
                                                <button key={opt} onClick={() => selectSingleOption("frecuencia", opt)} className="text-left px-5 py-4 rounded-2xl border border-zinc-800 bg-zinc-900/50 text-zinc-300 hover:border-emerald-500 hover:bg-emerald-500/10 hover:text-white transition-all duration-200 font-medium">{opt}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 4 && (
                                    <div className="flex flex-col gap-6">
                                        <h3 className="text-2xl font-semibold text-white leading-tight">¿Qué sientes que te está faltando para ser rentable?</h3>
                                        <div className="flex flex-col gap-3">
                                            {["Más control emocional", "Una estrategia clara", "Apoyo o guía al operar", "Constancia y disciplina"].map((opt) => (
                                                <button key={opt} onClick={() => selectSingleOption("falta", opt)} className="text-left px-5 py-4 rounded-2xl border border-zinc-800 bg-zinc-900/50 text-zinc-300 hover:border-emerald-500 hover:bg-emerald-500/10 hover:text-white transition-all duration-200 font-medium">{opt}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 5 && (
                                    <div className="flex flex-col gap-6">
                                        <h3 className="text-2xl font-semibold text-white leading-tight">¿Qué cambiaría en tu vida si logras la rentabilidad en 60 días?</h3>
                                        <div className="flex flex-col gap-3">
                                            {["Dejar mi empleo actual", "Alcanzar libertad financiera", "Más tiempo libre para mí", "Asegurar mi futuro"].map((opt) => (
                                                <button key={opt} onClick={() => selectSingleOption("cambio", opt)} className="text-left px-5 py-4 rounded-2xl border border-zinc-800 bg-zinc-900/50 text-zinc-300 hover:border-emerald-500 hover:bg-emerald-500/10 hover:text-white transition-all duration-200 font-medium">{opt}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 6 && (
                                    <div className="flex flex-col gap-6">
                                        <h3 className="text-2xl font-semibold text-white leading-tight">¿Qué formato te ayudaría más dentro de tu Guía?</h3>
                                        <div className="flex flex-col gap-3">
                                            {["Ejercicios prácticos", "Ejemplos reales", "Plantillas y checklists", "Tips de psicología"].map((opt) => (
                                                <button key={opt} onClick={() => { setAnswers((prev) => ({ ...prev, formato: opt })); handleNext(); }} className="text-left px-5 py-4 rounded-2xl border border-zinc-800 bg-zinc-900/50 text-zinc-300 hover:border-emerald-500 hover:bg-emerald-500/10 hover:text-white transition-all duration-200 font-medium">{opt}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 7 && (
                                    <div className="flex flex-col items-center justify-center py-12 gap-6 text-center">
                                        <Spinner />
                                        <h3 className="text-xl font-medium text-white max-w-[80%] leading-relaxed">Analizando tu perfil de trader y generando tu guía de Velas Japonesas...</h3>
                                    </div>
                                )}

                                {step === 8 && !success && (
                                    <div className="flex flex-col gap-6">
                                        <div className="text-center mb-2">
                                            <h3 className="text-3xl font-bold text-white mb-3">¡Tu diagnóstico y tu Guía están listos!</h3>
                                            <p className="text-zinc-400">¿A qué correo te enviamos el PDF y tus resultados?</p>
                                        </div>
                                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                                            <input type="text" placeholder="Tu Nombre" required value={contact.name} onChange={(e) => setContact({ ...contact, name: e.target.value })} className="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-4 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all" />
                                            <input type="email" placeholder="Correo Electrónico" required value={contact.email} onChange={(e) => setContact({ ...contact, email: e.target.value })} className="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-4 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all" />
                                            {errorMsg && <p className="text-red-400 text-sm text-center">{errorMsg}</p>}
                                            <button type="submit" disabled={isSubmitting} className="mt-2 w-full bg-gradient-to-r from-emerald-500 to-green-400 hover:from-emerald-400 hover:to-green-300 text-black font-bold py-4 rounded-xl shadow-lg shadow-emerald-500/20 transition-all disabled:opacity-70 flex items-center justify-center gap-2">
                                                {isSubmitting ? <Spinner /> : "Enviar Guía Gratis"}
                                            </button>
                                            <p className="text-xs text-zinc-600 text-center mt-2">Tus datos están seguros. No enviamos spam.</p>
                                        </form>
                                    </div>
                                )}

                                {success && (
                                    <div className="flex flex-col items-center justify-center py-10 gap-4 text-center">
                                        <div className="w-20 h-20 bg-emerald-500/20 border border-emerald-500/50 rounded-full flex items-center justify-center mb-2">
                                            <BigCheckIcon />
                                        </div>
                                        <h3 className="text-2xl font-bold text-white">¡Guía enviada!</h3>
                                        <p className="text-zinc-400">Simulación exitosa de la demostración.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function QuizTrigger() {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="flex flex-col items-center justify-center w-full max-w-4xl mx-auto py-12">
                    <h1 className="text-4xl font-bold mb-8">Diego Maraví - Landing Page Preview</h1>
                    <p className="text-zinc-400 mb-6 max-w-lg text-center leading-relaxed">No pudimos levantar el servidor local de Next.js por los permisos de npm de tu PC, pero he aquí un archivo aislado que emula cómo se ve y fluye el pop-up que diseñamos. Presiona el botón para interactuar.</p>

                    <button id="trigger-btn" onClick={() => setIsOpen(true)} className="px-8 py-4 bg-zinc-900 border border-zinc-700 hover:border-emerald-500 hover:bg-emerald-500/10 text-white rounded-2xl font-bold transition-all duration-300 shadow-lg flex items-center gap-2 w-max">
                        <span>Diagnóstico Gratuito + PDF</span>
                        <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" /></svg>
                    </button>

                    <QuizFunnel isOpen={isOpen} onClose={() => setIsOpen(false)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizTrigger />);
    </script>
</body>

</html>
